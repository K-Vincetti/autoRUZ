version: '3.8'

services:
  primary:
    image: postgres:16
    container_name: primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - primary_data:/var/lib/postgresql/data

  replica1:
    image: postgres:16
    container_name: replica1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - replica1_data:/var/lib/postgresql/data

  replica2:
    image: postgres:16
    container_name: replica2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - replica2_data:/var/lib/postgresql/data

volumes:
  primary_data:
    name: primary_data
  replica1_data:
    name: replica1_data
  replica2_data:
    name: replica2_data